*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}

/* ── COUNTDOWN ── */
#cd{
  position:fixed;inset:0;z-index:200;
  background:radial-gradient(ellipse at 50% 55%,#130026 0%,#000 78%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 1.4s cubic-bezier(.4,0,.2,1);
}
#cd.out{opacity:0;pointer-events:none;}
#sc{position:absolute;inset:0;pointer-events:none;}
.cd-logo{
  font-family:'Cinzel',serif;
  font-size:clamp(2.8rem,11vw,7rem);
  letter-spacing:.45em;
  background:linear-gradient(135deg,#e8c97a,#fff 45%,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:.3rem;
}
.cd-tag{color:rgba(192,132,252,.65);font-size:.8rem;letter-spacing:.35em;margin-bottom:3.5rem;font-family:'Noto Sans Thai',sans-serif;}
#cdn{
  font-family:'Cinzel',serif;
  font-size:clamp(9rem,30vw,20rem);line-height:1;
  background:linear-gradient(160deg,#fff 0%,#f9a8d4 55%,#c084fc 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  transition:transform .18s cubic-bezier(.36,2,.6,1);
}
#cdn.bump{transform:scale(1.18);}

/* ── SCENE ── */
#scene{
  position:fixed;inset:0;
  opacity:0;transition:opacity 1.8s ease;
  pointer-events:none;
}
#scene.on{opacity:1;pointer-events:auto;}

  </div>

  <div class="wm">BTS · ARMY · 방탄소년단</div>
</div>

<script>
(function(){
  var cv=document.getElementById('sc'),ctx=cv.getContext('2d');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  for(var i=0;i<240;i++){
    ctx.beginPath();ctx.arc(Math.random()*cv.width,Math.random()*cv.height,Math.random()*1.5+.3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,'+(Math.random()*.8+.1)+')';ctx.fill();
  }
})();

var n=5,numEl=document.getElementById('cdn'),cdEl=document.getElementById('cd'),sc=document.getElementById('scene');
function tick(){
  n--;
  if(n>0){
    numEl.classList.remove('bump');void numEl.offsetWidth;numEl.classList.add('bump');
    setTimeout(function(){numEl.classList.remove('bump');},220);
    numEl.textContent=n;setTimeout(tick,1000);
  }else{
    numEl.textContent='🎂';
    setTimeout(function(){
      cdEl.classList.add('out');sc.classList.add('on');
      spawnLS();spawnPetals();
      setTimeout(function(){cdEl.style.display='none';},1600);
    },700);
  }
}
setTimeout(tick,1000);

function spawnLS(){
  var row=document.getElementById('ls');
  var cols=['#9B59B6','#c084fc','#e879f9','#f472b6','#DDA0DD','#BDC3F7','#a78bfa','#fff'];
  var cnt=Math.floor(window.innerWidth/6);
  for(var i=0;i<cnt;i++){
    var l=document.createElement('div');l.className='l';var c=cols[i%cols.length];
    l.style.cssText='--c:'+c+';--h:'+Math.round(22+Math.random()*33)+'px;--sp:'+(1+Math.random()*2).toFixed(1)+'s;--dl:'+(Math.random()*1.4).toFixed(1)+'s;';
    row.appendChild(l);
  }
}

function spawnPetals(){
  var e=['💜','💜','💜','✨','💫','🌟','❤️','⭐'];
  setInterval(function(){
    var el=document.createElement('div');el.className='petal';
    el.textContent=e[Math.floor(Math.random()*e.length)];
    var dx=(Math.random()*100-50).toFixed(0)+'px';
    el.style.cssText='left:'+(Math.random()*100).toFixed(1)+'%;top:-4%;--d:'+(6+Math.random()*5).toFixed(1)+'s;--dl:0s;--dx:'+dx+';font-size:'+(0.8+Math.random()*.7).toFixed(1)+'rem;';
    document.body.appendChild(el);setTimeout(function(){el.remove();},12000);
  },550);
}
</script>
</body>
</html>
